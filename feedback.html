<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Александр Петров | Обратная связь</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-links">
        <a href="index.html">Биография</a>
        <a href="films.html">Фильмы</a>
        <a href="quotes.html">Цитаты</a>
        <a href="awards.html">Награды</a>
        <a href="feedback.html" class="active">Обратная связь</a>
    </nav>

    <section class="hero small-hero">
        <div class="container hero-content">
            <h1>Связь с нами</h1>
            <div class="subtitle">Ваше мнение важно для нас</div>
        </div>
    </section>

    <section id="feedback">
        <div class="container">
            <div class="feedback-section" data-aos="fade-up">
                <div class="feedback-title">
                    <i class="fas fa-envelope-open-text"></i>
                    <h3>Напишите нам</h3>
                    <p style="opacity:0.8; margin-top: 8px;">Заполните форму и мы обязательно ответим!</p>
                </div>
                
                <!-- ИСПРАВЛЕННАЯ ФОРМА - рабочий Formspree endpoint -->
                <form id="contactForm" action="https://formspree.io/f/xgvargdp" method="POST">
                    <div class="form-group">
                        <input type="text" name="name" id="name" placeholder="Ваше имя *" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" id="email" placeholder="Ваш Email *" required>
                    </div>
                    <div class="form-group">
                        <select name="topic" id="topic">
                            <option value="question">Вопрос о творчестве Александра</option>
                            <option value="suggestion">Пожелание для сайта</option>
                            <option value="cooperation">Сотрудничество</option>
                            <option value="other">Другое</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <textarea name="message" id="message" placeholder="Ваше сообщение..." required></textarea>
                    </div>
                    <input type="hidden" name="_subject" value="Новое сообщение с фан-сайта Александр Петрова">
                    <input type="hidden" name="_next" value="https://kry0s67.github.io/thanks.html">
                    <button type="submit" class="feedback-btn" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> Отправить сообщение
                    </button>
                    <div id="formStatus" class="form-status"></div>
                </form>
                
                <div class="telegram-mini">
                    <i class="fab fa-telegram"></i> Также вы можете написать нам в Telegram: 
                    <a href="https://t.me/kry0s67" target="_blank">@kry0s67</a>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="social-icons">
                <a href="https://t.me/kry0s67" target="_blank"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-vk"></i></a>
            </div>
            <p>Фан-сайт Александра Петрова | © 2026</p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="feedback-script.js"></script>
</body>
</html>
